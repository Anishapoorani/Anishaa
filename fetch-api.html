<html>
    <!DOCTYPE html>
    
    <body>

        <h2>Student Data</h2>
   
        <button onclick= "localData()">
            local student
        </button>

        <p id="result"></p>

        <script>

            async function localData(){

                const response = 
                await fetch(
                    "https://jsonplaceholder.typicode.com/users/1"
                );
                console.log(response);


                const data = 
                await response.json();
                console.log(data);

                document.getElementById("result")
                .textcontent = 
                "student Name : " + data.name;

            }
        </script>
    </body>
    </html>
